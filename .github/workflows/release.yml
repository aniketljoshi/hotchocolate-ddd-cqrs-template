name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version to publish when running manually
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-template:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Compute package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=${{ github.event.inputs.package_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore HotChocolateDddCqrsTemplate.sln

      - name: Build
        run: dotnet build HotChocolateDddCqrsTemplate.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test HotChocolateDddCqrsTemplate.sln --configuration Release --no-build

      - name: Pack template
        run: dotnet pack HotChocolateDddCqrsTemplate.TemplatePack.csproj --configuration Release -o artifacts -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-package
          path: artifacts/*.nupkg

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is not configured."
            exit 1
          fi

          dotnet nuget push artifacts/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.nupkg
