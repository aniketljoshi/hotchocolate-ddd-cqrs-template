name: Question
description: Ask about usage, architecture, or template behavior
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
      description: Include enough context for someone else to reproduce your setup.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Commands, code snippets, generated project name, or environment details.
