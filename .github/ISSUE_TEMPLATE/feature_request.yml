name: Feature request
description: Suggest an improvement for the template or launch kit
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or workflow you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and trade-offs
      description: Note any alternatives, breaking changes, or docs/tests needed.
