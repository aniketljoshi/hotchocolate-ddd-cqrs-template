name: Good first issue
description: Template for maintainers creating a newcomer-friendly issue
title: "[Good First Issue]: "
labels:
  - good first issue
  - documentation
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the change clearly and keep the scope small.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Helpful context
      description: Link related files, docs, or examples.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the expected outcome and any tests/docs needed.
