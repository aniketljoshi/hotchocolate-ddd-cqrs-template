services:
  api:
    container_name: hc-ddd-template-api
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogDb: Host=postgres;Port=5432;Database=hotchocolate_template;Username=postgres;Password=postgres
      OpenTelemetry__Enabled: "true"
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      SampleData__Enabled: "true"
    ports:
      - "5159:8080"

  postgres:
    image: postgres:17-alpine
    container_name: hc-ddd-template-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotchocolate_template
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    container_name: hc-ddd-template-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres_data:
